<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100 py-4">
    <div class="container">
        <!-- audio -->
         <!-- que el auido se toque automaticamente -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="audio-player text-center">
                    <div class="song-info mb-3">
                        <h6><i class="bi bi-music-note-beamed me-2"></i>Under</h6>
                        <small>Reproduciendo en segundo plano</small>
                    </div>
                    <audio hidden loop autoplay class="w-100">
                        <source src="under.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="row mb-5">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="fw-bold text-primary mb-0">
                        <i class="bi bi-person-plus me-2"></i>Registro de Estudiantes
                    </h1>
                    <button class="btn btn-outline-danger btn-lg" onclick="logout()">
                        <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                    </button>
                </div>
            </div>
        </div>

        <!-- Formulario Responsivo -->
        <div class="row mb-5">
            <div class="col-12 col-lg-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-person-plus-fill me-2"></i>Nuevo Estudiante
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label for="nombre" class="form-label fw-semibold">Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control form-control-lg" placeholder="Juan Pérez">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="correo" class="form-label fw-semibold">Correo Electrónico</label>
                                <input type="email" id="correo" class="form-control form-control-lg" placeholder="juan@example.com">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="whatsapp" class="form-label fw-semibold">WhatsApp</label>
                                <input type="tel" id="whatsapp" class="form-control form-control-lg" placeholder="3001234567">
                            </div>
                            <div class="col-12 col-md-6">
                                <label for="fechaNacimiento" class="form-label fw-semibold">Fecha de Nacimiento</label>
                                <input type="date" id="fechaNacimiento" class="form-control form-control-lg">
                            </div>
                        </div>
                        <div class="d-grid mt-4">
                            <button class="btn btn-success btn-lg fw-semibold py-3" onclick="guardarEstudiante()">
                                <i class="bi bi-save me-2"></i>Guardar Estudiante
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla Responsiva -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-list-ul me-2"></i>Lista de Estudiantes
                            <span class="badge bg-light text-dark ms-2" id="contador">0</span>
                        </h5>
                        <button class="btn btn-light btn-sm" onclick="limpiarTodo()">
                            <i class="bi bi-trash3"></i> Limpiar Todo
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Correo</th>
                                        <th>WhatsApp</th>
                                        <th>Fecha Nacimiento</th>
                                        <th>Edad</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaEstudiantes">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
